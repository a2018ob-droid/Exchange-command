<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>نموذج طباعة A4</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style type="text/tailwindcss">
    @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap');

    :root {
      --background: #f5f5f5;
      --foreground: #1a1a1a;
      --primary: #1a5c2a;
      --primary-foreground: #ffffff;
      --secondary: #e8f5e9;
      --secondary-foreground: #1a5c2a;
      --accent: #2e7d32;
      --accent-foreground: #ffffff;
      --muted: #f0f0f0;
      --muted-foreground: #6b7280;
      --card: #ffffff;
      --card-foreground: #1a1a1a;
      --border: #d1d5db;
      --input: #ffffff;
      --ring: #2e7d32;
      --radius: 4px;
      --font-sans: 'IBM Plex Sans Arabic', sans-serif;
    }

    @layer base {
      * {
        box-sizing: border-box;
        border-color: var(--border);
      }
      body {
        background-color: var(--background);
        color: var(--foreground);
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        direction: rtl;
      }
      html {
        scroll-behavior: smooth;
      }
      h1, h2, h3, h4, h5, h6, p {
        margin: 0;
      }
    }

    @layer utilities {
      .print-page {
        width: 210mm;
        min-height: 297mm;
        background: #ffffff;
        margin: 40px auto; /* أضفت مسافة عشان تظهر لك كصفحة في المتصفح */
        padding: 40px;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); /* ظل خفيف */
      }

      @media (max-width: 768px) {
        .print-page {
          width: 100% !important;
          min-height: unset !important;
          margin: 0 !important;
          border-radius: 0 !important;
          box-shadow: none !important;
          border: none !important;
        }
      }

      .signature-line {
        border-top: 1px solid #1a1a1a;
        width: 100%;
        margin-top: 32px;
      }

      .no-print {
        display: block;
      }
    }

    /* إعدادات وقت الطباعة (Ctrl+P) */
    @media print {
      @page {
        size: A4 portrait;
        margin: 8mm 10mm 4mm 10mm;
      }
      body {
        background: #ffffff !important;
      }
      .no-print {
        display: none !important;
      }
      .print-page {
        width: 100%;
        margin: 0;
        padding: 0;
        box-shadow: none !important;
      }
    }
  </style>
</head>
<body>

  <div class="text-center mt-8 no-print">
    <button onclick="window.print()" style="background-color: var(--primary);" class="text-white px-6 py-2 rounded-md font-bold hover:opacity-90">
      طباعة الصفحة
    </button>
  </div>

  <div class="print-page">
    
    <header class="flex justify-between items-center mb-10 border-b-2 pb-4" style="border-color: var(--primary);">
      <h1 class="text-3xl font-bold" style="color: var(--primary);">نموذج رسمي</h1>
      <p class="text-sm" style="color: var(--muted-foreground);">التاريخ: ٢٤ يونيو ٢٠٢٦</p>
    </header>

    <main>
      <h2 class="text-xl font-semibold mb-4">البيانات الأساسية:</h2>
      <p class="mb-6 leading-relaxed">
        هذا النص هو مثال على محتوى الصفحة. يمكنك إضافة الجداول، النصوص، أو أي عناصر أخرى هنا. 
        الكود اللي أرسلته مجهز بشكل ممتاز لاستقبال البيانات وتنسيقها لتكون جاهزة لطباعتها على ورق A4.
      </p>

      <table class="w-full border-collapse border mb-10 text-center">
        <thead>
          <tr style="background-color: var(--secondary); color: var(--secondary-foreground);">
            <th class="border p-2">الرقم</th>
            <th class="border p-2">البيان</th>
            <th class="border p-2">المبلغ</th>
          </tr>
        </thead>
        <tbody>
          <tr>
            <td class="border p-2">١</td>
            <td class="border p-2">خدمات تصميم</td>
            <td class="border p-2">١٥٠٠</td>
          </tr>
        </tbody>
      </table>
    </main>

    <div class="flex justify-between mt-20 w-1/2">
      <div class="w-40 text-center">
        <p class="mb-8 font-semibold">توقيع المستلم</p>
        <div class="signature-line"></div>
      </div>
    </div>

  </div>

</body>
</html>
