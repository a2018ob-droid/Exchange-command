  <script src="https://cdn.tailwindcss.com"></script>
  
  <style type="text/tailwindcss">
    @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@500;700;900&display=swap');

    :root {
      /* اللون الأساسي المأخوذ من الصورة (زيتي/ذهبي) */
      --brand: #8c7b50; 
      --black: #1a1a1a;
    }

    body {
      background-color: #f3f4f6;
      color: var(--black);
      font-family: 'Cairo', sans-serif; /* خط متناسق جداً مع المستندات الرسمية */
    }

    .brand-text {
      color: var(--brand);
    }

    @layer utilities {
      .print-page {
        width: 210mm;
        min-height: 297mm;
        background: #ffffff;
        margin: 40px auto;
        padding: 15mm 15mm;
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
      }

      /* تنسيق خاص للجوال */
      @media (max-width: 768px) {
        .print-page {
          width: 100% !important;
          min-height: unset !important;
          margin: 0 !important;
          padding: 20px !important;
          box-shadow: none !important;
        }
      }

      /* إعدادات الطباعة */
      @media print {
        @page {
          size: A4 portrait;
          margin: 0;
        }
        body {
          background: #ffffff !important;
        }
        .print-page {
          width: 100%;
          margin: 0;
          padding: 15mm;
          box-shadow: none !important;
        }
        .no-print {
          display: none !important;
        }
      }
    }
  </style>
</head>
